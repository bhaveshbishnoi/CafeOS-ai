version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: CafeOS-postgres
    restart: always
    environment:
      POSTGRES_USER: cafe_admin
      POSTGRES_PASSWORD: cafe_secret
      POSTGRES_DB: CafeOS_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: CafeOS-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
